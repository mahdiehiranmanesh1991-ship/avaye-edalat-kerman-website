<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 520" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6c879"/>
      <stop offset="0.5" stop-color="#c9a24b"/>
      <stop offset="1" stop-color="#9c7a2f"/>
    </linearGradient>
    <linearGradient id="gd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9b65f"/>
      <stop offset="1" stop-color="#8a6a28"/>
    </linearGradient>
  </defs>

  <!-- Pedestal -->
  <rect x="92" y="486" width="116" height="20" rx="4" fill="url(#gd)"/>
  <rect x="104" y="470" width="92" height="18" rx="3" fill="url(#g)"/>

  <!-- Robe / body -->
  <path d="M150 196c20 0 30 14 34 34l20 196c1 12-10 22-22 22h-64c-12 0-23-10-22-22l20-196c4-20 14-34 34-34z" fill="url(#g)"/>
  <!-- Robe drapery lines -->
  <path d="M150 232v220M126 250l-8 196M174 250l8 196M138 240l-12 210M162 240l12 210" stroke="#8a6a28" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round"/>

  <!-- Sash -->
  <path d="M120 244l60-26 4 12-60 26z" fill="url(#gd)"/>

  <!-- Neck + head -->
  <rect x="143" y="176" width="14" height="26" rx="6" fill="url(#g)"/>
  <circle cx="150" cy="160" r="26" fill="url(#g)"/>
  <!-- Hair -->
  <path d="M124 158c0-20 12-34 26-34s26 14 26 34c-6-8-16-12-26-12s-20 4-26 12z" fill="url(#gd)"/>
  <!-- Blindfold -->
  <rect x="123" y="152" width="54" height="12" rx="6" fill="#0f2c4c" opacity="0.92"/>
  <rect x="123" y="152" width="54" height="12" rx="6" fill="url(#gd)" opacity="0.25"/>

  <!-- Right arm holding sword (down) -->
  <path d="M178 214c14 4 22 16 24 30l6 70-12 1-8-68c-2-10-6-16-14-20z" fill="url(#g)"/>
  <!-- Sword -->
  <rect x="200" y="300" width="6" height="150" rx="3" fill="url(#gd)"/>
  <rect x="188" y="300" width="30" height="7" rx="3" fill="url(#g)"/>
  <rect x="200" y="288" width="6" height="16" rx="3" fill="url(#g)"/>

  <!-- Left arm raised holding the scale beam -->
  <path d="M122 214c-16 6-24 20-22 38l2 16 12-1-2-14c-1-10 3-18 14-23z" fill="url(#g)"/>

  <!-- Scales of justice -->
  <!-- vertical post from hand -->
  <rect x="146" y="70" width="8" height="60" rx="4" fill="url(#gd)"/>
  <circle cx="150" cy="68" r="9" fill="url(#g)"/>
  <!-- top beam -->
  <rect x="60" y="92" width="180" height="7" rx="3.5" fill="url(#g)"/>
  <circle cx="64" cy="95" r="6" fill="url(#gd)"/>
  <circle cx="236" cy="95" r="6" fill="url(#gd)"/>
  <!-- chains -->
  <path d="M64 98l-26 40M64 98l26 40M236 98l-26 40M236 98l26 40" stroke="url(#gd)" stroke-width="2.5"/>
  <!-- left pan -->
  <path d="M34 138h60a30 16 0 0 1-60 0z" fill="url(#g)"/>
  <!-- right pan -->
  <path d="M206 138h60a30 16 0 0 1-60 0z" fill="url(#g)"/>
</svg>
